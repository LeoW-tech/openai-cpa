version: '3.8'

services:
  openai-cpa-local:
    build: .
    image: openai-cpa-local:latest
    container_name: openai-cpa-local
    ports:
      - "8000:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST_PROJECT_PATH=${PWD}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
